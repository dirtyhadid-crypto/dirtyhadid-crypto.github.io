<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>红人流量 - 电商数据追踪看板</title>
    <script src="./auth.js?v=20260305"></script>
    <script>
      window.requireDashboardAuth("./index.html");
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260305" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  </head>
  <body class="app-shell">
    <header class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./overview.html">
          <span class="brand-icon" aria-hidden="true"></span>
          <span class="brand-text">Data Analytics</span>
        </a>
        <nav class="nav-links">
          <a class="nav-link" href="./overview.html">数据总览</a>
          <a class="nav-link" href="./amazon.html">亚马逊流量浮动</a>
          <a class="nav-link active" href="./influencer.html">红人</a>
          <a class="nav-link" href="./social.html">社媒</a>
          <a class="nav-link" href="./media.html">媒体</a>
        </nav>
        <div class="nav-user">
          <span class="avatar">A</span>
          <span class="user-name">Alex</span>
          <button id="logoutBtn" class="logout-mini" type="button">退出</button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-header">
        <h1>红人数据总览看板</h1>
      </section>

      <section class="panel">
        <h2>数据来源</h2>
        <div class="source-grid">
          <article class="source-card">
            <p class="source-title">本地上传 Excel / CSV</p>
            <div class="upload-row">
              <label class="file-btn" for="fileInput">上传红人数据</label>
              <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
              <p id="fileName" class="file-name">还没有上传文件</p>
            </div>
          </article>
          <article id="presetPanel" class="source-card hidden">
            <p class="source-title">仓库 excel 文件夹文件</p>
            <div class="source-select-row">
              <select id="presetFileSelect"></select>
              <button id="loadPresetBtn" class="action-btn secondary" type="button">加载文件</button>
            </div>
          </article>
        </div>
      </section>

      <section id="kpiPanel" class="summary-line hidden">
        <article class="summary-item">
          <span class="summary-label">点击量</span>
          <span id="sumClicks" class="summary-value">-</span>
        </article>
        <article class="summary-item">
          <span class="summary-label">总 DPV</span>
          <span id="sumDpv" class="summary-value">-</span>
        </article>
        <article class="summary-item">
          <span class="summary-label">ATC 总计</span>
          <span id="sumAtc" class="summary-value">-</span>
        </article>
        <article class="summary-item">
          <span class="summary-label">购买总额</span>
          <span id="sumRevenue" class="summary-value">-</span>
        </article>
        <article class="summary-item">
          <span class="summary-label">商品销量总计</span>
          <span id="sumUnits" class="summary-value">-</span>
        </article>
        <article class="summary-item">
          <span class="summary-label">品牌引流奖励计划</span>
          <span id="sumBonus" class="summary-value">-</span>
        </article>
      </section>

      <section id="chartPanel" class="source-grid hidden">
        <article class="panel">
          <h2 id="metricChartTitle">核心指标总量柱状图对比</h2>
          <p id="metricChartSubTitle" class="chart-title-note">等待加载数据</p>
          <div class="chart-wrap">
            <canvas id="metricBarChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2 id="publisherChartTitle">Top 发布商点击量对比</h2>
          <p id="publisherChartSubTitle" class="chart-title-note">等待加载数据</p>
          <div class="chart-wrap">
            <canvas id="publisherBarChart"></canvas>
          </div>
        </article>
      </section>

      <section id="tablePanel" class="panel hidden">
        <h2>红人数据明细</h2>
        <p id="tableSummary" class="table-kpi"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-sort-key="adGroup">广告组</th>
                <th class="sortable" data-sort-key="channel">Channel</th>
                <th class="sortable" data-sort-key="publisher">出版商</th>
                <th class="sortable" data-sort-key="clicks">点击量</th>
                <th class="sortable" data-sort-key="dpv">总 DPV</th>
                <th class="sortable" data-sort-key="atc">ATC 总计</th>
                <th class="sortable" data-sort-key="revenue">购买总额</th>
                <th class="sortable" data-sort-key="units">商品销量总计</th>
                <th class="sortable" data-sort-key="bonus">品牌引流奖励计划</th>
              </tr>
            </thead>
            <tbody id="influencerTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="emptyState" class="panel empty-state">
        上传红人报表后，这里会自动生成汇总数据、柱状图和数据表。
      </section>
    </main>

    <script src="./influencer.js?v=20260305"></script>
    <script>
      window.bindLogoutButton("logoutBtn", "./index.html");
    </script>
  </body>
</html>
