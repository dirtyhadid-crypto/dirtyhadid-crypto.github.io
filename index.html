<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访问验证</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }
    </style>
  </head>
  <body>
    <script>
      (function passwordGate() {
        const ACCESS_PASSWORD = "123456";
        const MAX_ATTEMPTS = 5;
        let attempts = 0;

        while (attempts < MAX_ATTEMPTS) {
          const input = window.prompt("请输入访问密码");
          if (input === null) {
            return;
          }
          if (input === ACCESS_PASSWORD) {
            window.location.replace("./dashboard.html");
            return;
          }
          attempts += 1;
          const left = MAX_ATTEMPTS - attempts;
          if (left > 0) {
            window.alert(`密码错误，还剩 ${left} 次机会。`);
          }
        }

        window.alert("尝试次数过多，请刷新页面后重试。");
      })();
    </script>
  </body>
</html>
