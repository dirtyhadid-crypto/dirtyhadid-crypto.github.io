<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安全入口 - 电商数据看板</title>
    <style>
      :root {
        --bg: #000;
        --card: rgba(10, 10, 10, 0.82);
        --line: rgba(236, 189, 84, 0.28);
        --text: #f0cc88;
        --muted: #b1925f;
        --accent: #f4ca6d;
        --accent-2: #bb8931;
        --danger: #db8d5f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .ambient {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(223, 168, 54, 0.2), transparent 28%),
          radial-gradient(circle at 82% 80%, rgba(168, 116, 36, 0.2), transparent 30%),
          radial-gradient(circle at 70% 20%, rgba(255, 217, 145, 0.06), transparent 20%);
        filter: blur(8px);
        transform: scale(1.1);
        animation: breathe 8s ease-in-out infinite;
      }

      .gate {
        width: min(420px, 92vw);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 26px 22px;
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        position: relative;
        z-index: 1;
      }

      .chip {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #f5d79f;
        border: 1px solid rgba(245, 215, 159, 0.3);
        border-radius: 999px;
        padding: 5px 10px;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: 1.45rem;
        line-height: 1.3;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      form {
        display: grid;
        gap: 10px;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.55);
        color: var(--text);
        padding: 12px 14px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        border-color: rgba(244, 202, 109, 0.7);
        box-shadow: 0 0 0 3px rgba(244, 202, 109, 0.15);
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        color: #261907;
        background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 100%);
        transition: transform 0.16s ease, box-shadow 0.16s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(201, 147, 54, 0.28);
      }

      .error {
        min-height: 20px;
        color: var(--danger);
        font-size: 0.9rem;
        margin-top: 2px;
      }

      .footer {
        margin-top: 10px;
        color: #8e8e8e;
        font-size: 0.82rem;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.72;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>
    <main class="gate">
      <span class="chip">Secure Access</span>
      <h1>电商数据追踪看板</h1>
      <p>请输入访问密码，验证通过后可访问 8 小时（当前浏览器记忆）。</p>

      <form id="gateForm" novalidate>
        <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="off" />
        <button type="submit">进入看板</button>
      </form>
      <div id="errorText" class="error" aria-live="polite"></div>
      <div class="footer">未授权访问将无法看到看板内容。</div>
    </main>

    <script src="./auth.js?v=20260304"></script>
    <script>
      (function initPasswordGate() {
        const form = document.getElementById("gateForm");
        const passwordInput = document.getElementById("passwordInput");
        const errorText = document.getElementById("errorText");
        const submitButton = form.querySelector("button[type='submit']");

        window.hasDashboardAccess().then((authenticated) => {
          if (authenticated) {
            window.location.replace("./overview.html");
          }
        });

        form.addEventListener("submit", async function onSubmit(event) {
          event.preventDefault();
          errorText.textContent = "";
          const value = passwordInput.value;

          if (!value) {
            errorText.textContent = "请输入密码。";
            passwordInput.focus();
            return;
          }

          submitButton.disabled = true;
          const result = await window.loginWithPassword(value);
          submitButton.disabled = false;

          if (result.ok) {
            window.location.href = "./overview.html";
            return;
          }

          errorText.textContent = result.data.message || "密码错误，请重试。";
          passwordInput.select();
          passwordInput.focus();
        });
      })();
    </script>
  </body>
</html>
