<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社媒流量 - 电商数据追踪看板</title>
    <script src="./auth.js"></script>
    <script>
      window.requireDashboardAuth("./index.html");
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  </head>
  <body
    class="app-shell"
    data-metric-label="社媒流量"
    data-metric-keywords="社媒,social,facebook,instagram,tiktok,youtube,流量,traffic,visits"
  >
    <header class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./overview.html"><span class="brand-mark">⬢</span> TRACK BOARD</a>
        <nav class="nav-links">
          <a class="nav-link" href="./overview.html">数据总览</a>
          <a class="nav-link" href="./amazon.html">亚马逊流量浮动</a>
          <a class="nav-link" href="./influencer.html">红人</a>
          <a class="nav-link active" href="./social.html">社媒</a>
          <a class="nav-link" href="./media.html">媒体</a>
        </nav>
        <button id="logoutBtn" class="logout-mini" type="button">退出登录</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-header">
        <h1>社媒流量</h1>
        <p>上传社媒渠道数据，观察日趋势、峰值和累计变化。</p>
      </section>

      <section id="kpiPanel" class="stats-grid hidden">
        <article class="stat-card">
          <p class="stat-title">最新 <span data-metric-label></span></p>
          <p id="latestValue" class="stat-value">-</p>
          <p id="latestChange" class="stat-note">-</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">7日均值</p>
          <p id="avgValue" class="stat-value">-</p>
          <p class="stat-note">最近7天（不足7天按已有数据）</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">累计总量</p>
          <p id="totalValue" class="stat-value">-</p>
          <p class="stat-note">筛选范围内汇总</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">峰值</p>
          <p id="peakValue" class="stat-value">-</p>
          <p id="peakDate" class="stat-note">峰值日期: -</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">记录天数</p>
          <p id="rowCountValue" class="stat-value">-</p>
          <p class="stat-note">已统计天数</p>
        </article>
      </section>

      <section class="panel">
        <div class="upload-row">
          <label class="file-btn" for="fileInput">上传社媒数据</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
          <p id="fileName" class="file-name">还没有上传文件</p>
        </div>
        <p class="panel-hint">建议列名：日期、社媒流量。</p>
      </section>

      <section id="mappingPanel" class="panel hidden">
        <h2>字段映射</h2>
        <div class="mapping-grid two-columns">
          <label>
            日期列
            <select id="dateColumn"></select>
          </label>
          <label>
            <span data-metric-label></span>列
            <select id="valueColumn"></select>
          </label>
        </div>
        <button id="applyMappingBtn" class="action-btn">应用映射并生成看板</button>
      </section>

      <section id="filterPanel" class="panel hidden">
        <div class="filter-row">
          <label for="rangeSelect">展示范围</label>
          <select id="rangeSelect">
            <option value="all">全部</option>
            <option value="30" selected>最近30天</option>
            <option value="14">最近14天</option>
            <option value="7">最近7天</option>
          </select>
        </div>
      </section>

      <section id="chartPanel" class="panel hidden">
        <h2><span data-metric-label></span>折线图</h2>
        <div class="chart-wrap">
          <canvas id="metricChart"></canvas>
        </div>
      </section>

      <section id="tablePanel" class="panel hidden">
        <h2>数据明细表</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th><span data-metric-label></span></th>
              </tr>
            </thead>
            <tbody id="metricTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="emptyState" class="panel empty-state">
        上传并映射字段后，这里会显示社媒流量折线图和表格。
      </section>
    </main>

    <script src="./channel.js"></script>
    <script>
      window.bindLogoutButton("logoutBtn", "./index.html");
    </script>
  </body>
</html>
