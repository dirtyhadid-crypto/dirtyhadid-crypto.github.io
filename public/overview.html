<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据总览 - 电商数据追踪看板</title>
    <script src="./auth.js"></script>
    <script>
      window.requireDashboardAuth("./index.html");
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  </head>
  <body class="app-shell">
    <header class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./overview.html"><span class="brand-mark">⬢</span> TRACK BOARD</a>
        <nav class="nav-links">
          <a class="nav-link active" href="./overview.html">数据总览</a>
          <a class="nav-link" href="./amazon.html">亚马逊流量浮动</a>
          <a class="nav-link" href="./influencer.html">红人</a>
          <a class="nav-link" href="./social.html">社媒</a>
          <a class="nav-link" href="./media.html">媒体</a>
        </nav>
        <button id="logoutBtn" class="logout-mini" type="button">退出登录</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-header">
        <h1>数据总览</h1>
        <p>上传包含多渠道流量的 Excel，快速查看总流量、趋势和每日明细。</p>
      </section>

      <section id="kpiPanel" class="stats-grid hidden">
        <article class="stat-card">
          <p class="stat-title">总流量（最新）</p>
          <p id="kpiTotalValue" class="stat-value">-</p>
          <p id="kpiTotalChange" class="stat-note">-</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">亚马逊（最新）</p>
          <p id="kpiAmazonValue" class="stat-value">-</p>
          <p id="kpiAmazonChange" class="stat-note">-</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">红人（最新）</p>
          <p id="kpiInfluencerValue" class="stat-value">-</p>
          <p id="kpiInfluencerChange" class="stat-note">-</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">社媒（最新）</p>
          <p id="kpiSocialValue" class="stat-value">-</p>
          <p id="kpiSocialChange" class="stat-note">-</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">媒体（最新）</p>
          <p id="kpiMediaValue" class="stat-value">-</p>
          <p id="kpiMediaChange" class="stat-note">-</p>
        </article>
      </section>

      <section class="panel">
        <div class="upload-row">
          <label class="file-btn" for="fileInput">上传总览数据</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
          <p id="fileName" class="file-name">还没有上传文件</p>
        </div>
        <p class="panel-hint">建议列名：日期、亚马逊流量、红人流量、社媒流量、媒体流量。</p>
      </section>

      <section id="mappingPanel" class="panel hidden">
        <h2>字段映射</h2>
        <div class="mapping-grid">
          <label>
            日期列
            <select id="dateColumn"></select>
          </label>
          <label>
            亚马逊流量列
            <select id="amazonColumn"></select>
          </label>
          <label>
            红人流量列
            <select id="influencerColumn"></select>
          </label>
          <label>
            社媒流量列
            <select id="socialColumn"></select>
          </label>
          <label>
            媒体流量列
            <select id="mediaColumn"></select>
          </label>
        </div>
        <button id="applyMappingBtn" class="action-btn">应用映射并生成看板</button>
      </section>

      <section id="filterPanel" class="panel hidden">
        <div class="filter-row">
          <label for="rangeSelect">展示范围</label>
          <select id="rangeSelect">
            <option value="all">全部</option>
            <option value="30" selected>最近30天</option>
            <option value="14">最近14天</option>
            <option value="7">最近7天</option>
          </select>
        </div>
      </section>

      <section id="chartPanel" class="panel hidden">
        <h2>流量趋势折线图</h2>
        <div class="chart-wrap">
          <canvas id="overviewChart"></canvas>
        </div>
      </section>

      <section id="tablePanel" class="panel hidden">
        <h2>每日数据表</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>总流量</th>
                <th>亚马逊</th>
                <th>红人</th>
                <th>社媒</th>
                <th>媒体</th>
              </tr>
            </thead>
            <tbody id="overviewTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="emptyState" class="panel empty-state">
        上传数据并完成字段映射后，这里会显示图表和明细表。
      </section>
    </main>

    <script src="./overview.js"></script>
    <script>
      window.bindLogoutButton("logoutBtn", "./index.html");
    </script>
  </body>
</html>
